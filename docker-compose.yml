services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: db
    ports:
      - "3306:3306"

  springboot-app:
    build: .
    container_name: springboot-app
    depends_on:
      - mysql
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/db?createDatabaseIfNotExist=true
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: 1234
    ports:
      - "8081:8081"
